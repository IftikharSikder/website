<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/website/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Iftikhar Ahammad">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Iftikhar Ahammad</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --splash-bg: #0f172a;
      --splash-bg-2: #111b34;
      --splash-accent: #2563eb;
      --splash-accent-2: #60a5fa;
      --splash-text: #e5eefc;
      --splash-muted: #8ea3c7;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.16), transparent 34%),
        linear-gradient(180deg, var(--splash-bg-2), var(--splash-bg));
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
    }

    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 30%, rgba(96, 165, 250, 0.14), transparent 28%),
        linear-gradient(180deg, rgba(17, 27, 52, 0.96), rgba(15, 23, 42, 0.98));
      transition: opacity 420ms ease, visibility 420ms ease;
    }

    #app-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-shell {
      position: relative;
      width: min(360px, 86vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .splash-mark {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 26px;
      color: var(--splash-text);
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .splash-chevron {
      position: relative;
      width: 28px;
      height: 28px;
      color: var(--splash-accent-2);
      animation: splashFloat 2.2s ease-in-out infinite;
    }

    .splash-chevron::before,
    .splash-chevron::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
      left: 6px;
      transform-origin: left center;
    }

    .splash-chevron::before {
      top: 9px;
      transform: rotate(-42deg);
    }

    .splash-chevron::after {
      top: 16px;
      transform: rotate(42deg);
    }

    .splash-dev {
      color: var(--splash-accent-2);
    }

    .splash-loader {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto 22px;
    }

    .splash-ring,
    .splash-ring::before,
    .splash-ring::after {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      content: "";
    }

    .splash-ring {
      border-top-color: rgba(96, 165, 250, 0.95);
      border-right-color: rgba(37, 99, 235, 0.5);
      animation: splashSpin 1.25s linear infinite;
    }

    .splash-ring::before {
      inset: 10px;
      border-left-color: rgba(96, 165, 250, 0.75);
      border-bottom-color: rgba(37, 99, 235, 0.45);
      animation: splashSpinReverse 1.6s linear infinite;
    }

    .splash-ring::after {
      inset: 22px;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.95), rgba(37, 99, 235, 0.85));
      box-shadow: 0 0 24px rgba(37, 99, 235, 0.38);
      animation: splashPulse 1.8s ease-in-out infinite;
      border: 0;
    }

    .splash-title {
      position: relative;
      margin: 0;
      color: var(--splash-text);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--splash-accent-2);
      opacity: 0.92;
    }

    .splash-subtitle {
      position: relative;
      margin: 10px 0 0;
      color: var(--splash-muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .splash-progress {
      position: relative;
      width: min(220px, 72vw);
      height: 5px;
      margin-top: 22px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.14);
    }

    .splash-progress::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--splash-accent), var(--splash-accent-2));
      box-shadow: 0 0 18px rgba(37, 99, 235, 0.34);
      animation: splashProgress 1.4s ease-in-out infinite;
    }

    @keyframes splashSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes splashSpinReverse {
      to { transform: rotate(-360deg); }
    }

    @keyframes splashPulse {
      0%, 100% { transform: scale(0.9); }
      50% { transform: scale(1.08); }
    }

    @keyframes splashFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes splashProgress {
      0% { transform: translateX(-40%); }
      50% { transform: translateX(140%); }
      100% { transform: translateX(240%); }
    }

  </style>
</head>
<body>
  <div id="app-splash">
    <div class="splash-shell">
      <div class="splash-mark">
        <span class="splash-chevron"></span>
        <span>Flutter<span class="splash-dev">Dev</span></span>
      </div>
      <div class="splash-loader">
        <div class="splash-ring"></div>
      </div>
      <h1 class="splash-title">Loading</h1>
      <p class="splash-subtitle">
        Preparing the interactive experience.
      </p>
      <div class="splash-progress"></div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    (function () {
      const splash = document.getElementById('app-splash');

      function hideSplash() {
        if (!splash || splash.classList.contains('hidden')) return;
        splash.classList.add('hidden');
        window.setTimeout(() => splash.remove(), 500);
      }

      const observer = new MutationObserver(() => {
        const flutterReady =
          document.querySelector('flt-glass-pane') ||
          document.querySelector('flutter-view') ||
          document.querySelector('flt-scene-host') ||
          document.querySelector('canvas');

        if (flutterReady) {
          hideSplash();
          observer.disconnect();
        }
      });

      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
